services:
  db:
    image: postgres:17-alpine
    container_name: dashboard-afazio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dashboard_afazio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - dashboard_afazio_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-afazio-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/dashboard_afazio}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      APP_GOOGLE_CALENDAR_ID: ${APP_GOOGLE_CALENDAR_ID:-primary}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      APP_FRONT_URL: ${APP_FRONT_URL:-http://localhost:5173}
      APP_TEACHER_NAME: ${APP_TEACHER_NAME:-Antonella Fazio}
      APP_TEACHER_CUIT: ${APP_TEACHER_CUIT:-27361923850}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:-changeme-client-id}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:-changeme-client-secret}
    ports:
      - "8080:8080"

volumes:
  dashboard_afazio_pgdata:
