spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

app.teacher.name=${APP_TEACHER_NAME:Antonella Fazio}
app.teacher.cuit=${APP_TEACHER_CUIT:27361923850}
app.google.calendar-id=${APP_GOOGLE_CALENDAR_ID}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}
app.front.url=${APP_FRONT_URL:http://localhost:5173}

spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email,https://www.googleapis.com/auth/calendar.events,https://www.googleapis.com/auth/gmail.send
